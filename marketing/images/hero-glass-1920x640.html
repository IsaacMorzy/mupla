<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>mupla-front — Website Hero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 640px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(110% 65% at 5% 25%, #7c6bff 0%, transparent 38%),
      radial-gradient(80% 55% at 95% 75%, #3b30d0 0%, transparent 40%),
      linear-gradient(130deg, #090a1f 0%, #18184f 100%);
    color: #ffffff; overflow: hidden; position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: radial-gradient(ellipse 70% 70% at 40% 50%, black 25%, transparent 70%);
  }
  .glass {
    position: absolute; left: 100px; top: 50%; transform: translateY(-50%);
    width: 1260px; height: 500px;
    background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 28px;
    backdrop-filter: blur(18px);
    box-shadow: 0 30px 80px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.14);
    padding: 64px 80px;
  }
  .eyebrow { font-size: 13px; letter-spacing: .24em; text-transform: uppercase; color: #b7c3ff; opacity: .85; }
  h1 {
    margin-top: 18px; font-size: 88px; line-height: 1.05; font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(180deg,#ffffff 30%,#cfd3f7 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p {
    margin-top: 22px; font-size: 26px; line-height: 1.3; color: #d5d8f5; max-width: 1100px; font-weight: 400;
  }
  .cta {
    display: inline-block; margin-top: 26px; padding: 14px 26px; border-radius: 999px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.24);
    color: white; font-weight: 600; font-size: 16px;
  }
  .wordmark { position: absolute; right: 100px; bottom: 48px; font-size: 14px; letter-spacing: .18em; text-transform: uppercase; color: #b7c9ff; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glass">
    <div class="eyebrow">Frontend Studio for Teams</div>
    <h1>mupla-front</h1>
    <p>Review, version, and ship frontend work in one place. The missing layer between Figma and your codebase.</p>
    <div class="cta">Start your first project free →</div>
  </div>
  <div class="wordmark">by fluone</div>
</body>
</html>
