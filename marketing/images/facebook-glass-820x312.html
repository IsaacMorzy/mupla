<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=820">
<title>mupla-front — Facebook Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 820px; height: 312px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(90% 60% at 5% 40%, #7c6bff 0%, transparent 38%),
      radial-gradient(70% 50% at 95% 60%, #3b30d0 0%, transparent 42%),
      linear-gradient(120deg, #090a1f 0%, #16164d 100%);
    color: #ffffff; overflow: hidden; position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 60% 70% at 40% center, black 30%, transparent 70%);
  }
  .glass {
    position: absolute; left: 48px; top: 50%; transform: translateY(-50%);
    width: 500px; height: 200px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    backdrop-filter: blur(14px);
    box-shadow: 0 20px 52px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
    padding: 28px 34px;
  }
  .eyebrow { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: #b7c3ff; opacity: .85; }
  h1 {
    margin-top: 10px; font-size: 40px; line-height: 1.05; font-weight: 800; letter-spacing: -.02em;
    background: linear-gradient(180deg,#ffffff 30%,#cfd3f7 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p {
    margin-top: 10px; font-size: 17px; line-height: 1.3; color: #d5d8f5; font-weight: 400;
  }
  .accent {
    position: absolute; right: 48px; top: 50%; transform: translateY(-50%);
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle at center, #8ea4ff 0%, #5b4bff 40%, transparent 70%);
    filter: blur(28px); opacity: .24;
  }
  .wordmark { position: absolute; right: 48px; bottom: 20px; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #b7c9ff; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="accent"></div>
  <div class="glass">
    <div class="eyebrow">Frontend Studio for Teams</div>
    <h1>mupla-front</h1>
    <p>From design mockup to production frontend in minutes. The missing layer between Figma and your repo.</p>
  </div>
  <div class="wordmark">by fluone</div>
</body>
</html>
