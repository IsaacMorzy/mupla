<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584">
<title>mupla-front — LinkedIn Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(100% 70% at 0% 30%, #7c6bff 0%, transparent 40%),
      radial-gradient(80% 60% at 85% 80%, #3b30d0 0%, transparent 45%),
      linear-gradient(120deg, #090a1f 0%, #16164d 100%);
    color: #ffffff; overflow: hidden; position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: radial-gradient(ellipse 65% 70% at center, black 25%, transparent 70%);
  }
  .glass {
    position: absolute; left: 72px; top: 50%; transform: translateY(-50%);
    width: 880px; height: 280px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 24px;
    backdrop-filter: blur(16px);
    box-shadow: 0 24px 64px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.12);
    padding: 44px 56px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .24em; text-transform: uppercase; color: #b7c3ff; opacity: .85; }
  h1 {
    margin-top: 12px; font-size: 62px; line-height: 1.05; font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(180deg,#ffffff 30%,#d1d5f8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p {
    margin-top: 14px; font-size: 22px; line-height: 1.3; color: #d5d8f5; max-width: 760px; font-weight: 400;
  }
  .accent {
    position: absolute; right: 80px; top: 50%; transform: translateY(-50%);
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle at center, #8ea4ff 0%, #5b4bff 40%, transparent 70%);
    filter: blur(36px); opacity: .22;
  }
  .cta {
    display: inline-block; margin-top: 18px; padding: 12px 24px; border-radius: 999px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.24);
    color: white; font-weight: 600; font-size: 15px;
  }
  .wordmark { position: absolute; right: 72px; bottom: 28px; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: #b7c9ff; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="accent"></div>
  <div class="glass">
    <div class="eyebrow">Frontend Studio for Teams</div>
    <h1>mupla-front</h1>
    <p>Ship designs faster. Review, version, and hand off frontend work in one place, not three.</p>
    <div class="cta">Start your first project free →</div>
  </div>
  <div class="wordmark">by fluone</div>
</body>
</html>
