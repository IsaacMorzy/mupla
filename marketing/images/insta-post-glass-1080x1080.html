<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>mupla-front — Instagram Post</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(100% 80% at 10% 0%, #7c6bff 0%, transparent 42%),
      radial-gradient(80% 60% at 90% 100%, #3b30d0 0%, transparent 42%),
      linear-gradient(135deg, #090a1f 0%, #16164d 100%);
    color: #ffffff; overflow: hidden; position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 70% 65% at 35% 40%, black 25%, transparent 70%);
  }
  .glass {
    position: absolute; left: 80px; top: 50%; transform: translateY(-50%);
    width: 900px; height: 780px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 32px;
    backdrop-filter: blur(18px);
    box-shadow: 0 40px 100px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.14);
    padding: 80px 88px;
  }
  .eyebrow { font-size: 14px; letter-spacing: .26em; text-transform: uppercase; color: #b7c3ff; }
  h1 {
    margin-top: 26px; font-size: 110px; line-height: 1.05; font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(180deg,#ffffff 30%,#d1d5f8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p {
    margin-top: 30px; font-size: 38px; line-height: 1.3; color: #dbe0ff; max-width: 740px; font-weight: 400;
  }
  .cta {
    display: inline-block; margin-top: 30px; padding: 18px 30px; border-radius: 999px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.24);
    color: white; font-weight: 700; font-size: 20px;
  }
  .wordmark { position: absolute; right: 80px; bottom: 60px; font-size: 14px; letter-spacing: .18em; text-transform: uppercase; color: #b7c9ff; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glass">
    <div class="eyebrow">Frontend Studio for Teams</div>
    <h1>mupla-front</h1>
    <p>From design mockup to production frontend in minutes. Designed for teams tired of Slack screenshots and comment ping-pong.</p>
    <div class="cta">Try it free →</div>
  </div>
  <div class="wordmark">by fluone</div>
</body>
</html>
