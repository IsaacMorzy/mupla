<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2560">
<title>mupla-front — YouTube Channel Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 2560px; height: 1440px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    background:
      radial-gradient(110% 70% at 5% 25%, #7c6bff 0%, transparent 38%),
      radial-gradient(80% 60% at 95% 75%, #3b30d0 0%, transparent 40%),
      linear-gradient(130deg, #090a1f 0%, #18184f 100%);
    color: #ffffff; overflow: hidden; position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 90px 90px;
    mask-image: radial-gradient(ellipse 70% 65% at 35% 45%, black 25%, transparent 70%);
  }
  .glass {
    position: absolute; left: 130px; top: 50%; transform: translateY(-50%);
    width: 1600px; height: 1000px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 56px;
    backdrop-filter: blur(20px);
    box-shadow: 0 60px 150px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.14);
    padding: 110px 120px;
  }
  .eyebrow { font-size: 18px; letter-spacing: .26em; text-transform: uppercase; color: #b7c3ff; }
  h1 {
    margin-top: 26px; font-size: 150px; line-height: 1.05; font-weight: 800; letter-spacing: -.04em;
    background: linear-gradient(180deg,#ffffff 30%,#cfd3f7 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p {
    margin-top: 30px; font-size: 44px; line-height: 1.35; color: #dbe0ff; max-width: 1400px; font-weight: 400;
  }
  .cta {
    display: inline-block; margin-top: 36px; padding: 20px 32px; border-radius: 999px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.24);
    color: white; font-weight: 700; font-size: 22px;
  }
  .wordmark {
    position: absolute; right: 130px; bottom: 90px;
    font-size: 16px; letter-spacing: .18em; text-transform: uppercase; color: #b7c9ff;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glass">
    <div class="eyebrow">Frontend Studio for Teams</div>
    <h1>mupla-front</h1>
    <p>Stop handoff ping-pong. Review, version, and ship frontend work from design to deploy in one studio.</p>
    <div class="cta">Schedule a 10-minute demo →</div>
  </div>
  <div class="wordmark">by fluone</div>
</body>
</html>
